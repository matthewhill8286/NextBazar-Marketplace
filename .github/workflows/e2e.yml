name: E2E Tests

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

# Cancel any in-progress run for the same branch/PR so we don't waste minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit # only run e2e if unit tests pass

    env:
      # Public vars — safe to expose; the e2e tests mock all Supabase API calls
      # anyway so these are only needed for the app to boot without errors.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      # Non-public vars used server-side during the build/dev server start
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_SECRET: ${{ secrets.SYNC_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
        # We run chromium only in CI for speed; mobile-chrome can be added later.
        # The webServer block in playwright.config.ts starts Next.js automatically.

      - name: Upload Playwright report
        if: always() # upload even on failure so you can inspect what broke
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test screenshots (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_id }}
          path: test-results/
          retention-days: 7
